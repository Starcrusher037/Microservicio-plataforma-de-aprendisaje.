name: Build and Push Docker Image
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
      
jobs: 
  build:
    runs-on: ubuntu-latest 
    steps:

      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker (Genérica y limpia)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/autenticacion-service:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/autenticacion-service:latest
          
      # Paso 5: Configurar credenciales de AWS para SSH
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Cambia a tu región si es necesario
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 5.5: Agregar llave SSH de Amazon Linux de forma segura
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          cat << 'EOF' > ~/.ssh/id_rsa
          ${{ secrets.EC2_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa
          
      # Paso 6: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticar en DockerHub desde EC2
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Descargar la última versión de la imagen real de tu servicio
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/autenticacion-service:latest
            
            # Preparar la Oracle Wallet localmente en el servidor EC2
            mkdir -p ~/oracle_wallet
            echo "${{ secrets.ORACLE_WALLET_BASE64 }}" | base64 --decode > ~/oracle_wallet/wallet.zip
            unzip -j -o ~/oracle_wallet/wallet.zip -d ~/oracle_wallet/
            sed -i 's|"?/network/admin"|"/app/wallet"|g' ~/oracle_wallet/sqlnet.ora
            rm ~/oracle_wallet/wallet.zip
            
            # Parar y eliminar cualquier contenedor previo
            docker stop autenticacion-service || true && docker rm autenticacion-service || true
            
            # Iniciar el contenedor coordinando Puertos, Volúmenes y Variables
            docker run -d --name autenticacion-service -p 8081:8081 \
              -v ~/oracle_wallet:/app/wallet \
              -e SPRING_DATASOURCE_URL="jdbc:oracle:thin:@${{ secrets.ORACLE_TNS_NAME }}?TNS_ADMIN=/app/wallet" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.ORACLE_DB_USER }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/autenticacion-service:latest
          EOF